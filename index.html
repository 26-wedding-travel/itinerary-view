<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0d4f45">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="2026 신혼여행">
    <title>2026 신혼여행 일정 시각화</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
    >
    <link rel="stylesheet" href="styles.css">
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
    ></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">2026.06.29 - 07.11</p>
          <h1>신혼여행 일정 시각화</h1>
        </div>
        <div class="trip-chip" aria-label="전체 여행 동선">
          바르셀로나 → 스위스 → 피렌체 → 로마
        </div>
      </header>

      <main class="planner-layout">
        <aside class="day-panel" aria-label="날짜 선택">
          <div class="panel-heading">
            <h2>일자</h2>
            <p id="trip-count">13일</p>
          </div>
          <div id="day-list" class="day-list"></div>
        </aside>

        <section class="detail-panel" aria-live="polite">
          <div class="selected-day">
            <div>
              <p id="selected-date" class="eyebrow"></p>
              <h2 id="selected-title"></h2>
            </div>
            <div id="selected-lodging" class="lodging-pill"></div>
          </div>

          <div class="summary-grid">
            <div class="summary-item">
              <span>지역</span>
              <strong id="selected-city"></strong>
            </div>
            <div class="summary-item">
              <span>동선</span>
              <strong id="selected-route"></strong>
            </div>
          </div>

          <div class="map-route-grid">
            <section class="map-section" aria-label="지도">
              <div id="map"></div>
              <div id="map-fallback" class="map-fallback" hidden>
                지도를 불러오지 못했습니다. 아래 동선 목록은 계속 사용할 수 있습니다.
              </div>
            </section>

            <section class="route-section" aria-label="동선 순서">
              <h3>동선 순서</h3>
              <ol id="stop-list" class="stop-list"></ol>
            </section>
          </div>

          <section id="guide-section" class="guide-section" hidden>
            <h3>현장 도슨트</h3>
            <div id="guide-tabs" class="guide-tabs" role="tablist" aria-label="도슨트 위치"></div>
            <div id="guide-reading" class="guide-reading"></div>
          </section>

          <section id="food-section" class="food-section" hidden>
            <h3>식사 후보</h3>
            <div id="food-list" class="food-list"></div>
          </section>

          <div class="content-grid">
            <section class="timeline-section">
              <h3>시간표</h3>
              <div id="timeline" class="timeline"></div>
            </section>

            <section class="transport-section">
              <h3>교통 메모</h3>
              <ul id="transport-list" class="transport-list"></ul>
            </section>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
